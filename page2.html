      font-family: Arial;
      margin-top: 100px;
      background: #222;

<body>

<h2>تحسب خلصنا؟</h2>

<p>وش الشيء الي انا أزيفه<br>

<input type="text" id="answer">

<button onclick="checkAnswer()">تحقق</button>

<script>
function checkAnswer() {

  if (answer.includes("smile")) {

    alert("غلط");
  }
}
